baseURL = "https://0xrh0d4m1n.tech/"
languageCode = "en-us"
title = "0xrh0d4m1n"
enableRobotsTXT = true
enableGitInfo = true

staticDir = ["static", "docs/assets"]

[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

[markup]
  [markup.highlight]
    noClasses = false
    style = "monokai"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # Allow raw HTML in Markdown

[params]
  description = "Hacking and general cybersecurity."

  [params.navbar]
    displayTitle = true
    displayLogo = true
    [params.navbar.logo]
      path = "img/logos/logo.svg"
      dark = "img/logos/logo.svg"
      width = 40
      height = 40
  [params.search]
    enable = true

  [params.footer]
    displayCopyright = true
    displayPoweredBy = false
    copyright = "Copyright &copy; 2026 - 0xrh0d4m1n"

  [params.theme]
    default = "dark"
    displayToggle = true

  [params.page]
    # Show breadcrumbs on all pages
    breadcrumbs = true

